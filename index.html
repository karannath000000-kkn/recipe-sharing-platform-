<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Recipe Sharing Platform</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="auth-container" id="authPage">

    <div class="phone-frame">

        <div class="top-section">

            <img
            src="https://images.unsplash.com/photo-1490645935967-10de6ba17061?q=80&w=1000&auto=format&fit=crop"
            class="food-image">

            <div class="auth-tabs">

                <span class="active-tab">
                    Login
                </span>

                <span>
                    Signup
                </span>

            </div>

        </div>

        <div class="auth-card">

            <input
                type="email"
                id="email"
                placeholder="Enter Email"
            >

            <input
                type="password"
                id="password"
                placeholder="Enter Password"
            >

            <p class="forgot">
                Forgot password?
            </p>

            <button
            class="modern-login-btn"
            onclick="login()">

                Login

            </button>

            <button
            class="modern-signup-btn"
            onclick="signup()">

                Signup

            </button>

        </div>

    </div>

</div>
<div id="app" style="display:none;">
    <div class="premium-home">

    <!-- TOP MENU -->
    <div class="premium-navbar">
<div class="menu-logo">

    <div
    class="menu-icon"
    onclick="toggleMenu()">

        ☰

    </div>

    <div
    class="dropdown-menu"
    id="dropdownMenu">

        <button onclick="showSection('profile')">
            👤 Profile
        </button>

        <button onclick="showSection('favorites')">
            ❤️ Favorites
        </button>

        <button onclick="toggleDarkMode()">
            🌙 Dark Mode
        </button>

        <button onclick="logout()">
            🚪 Logout
        </button>

    </div>

</div>

        <div class="nav-links">

            <button onclick="showSection('profile')">
                Profile
            </button>

            <button onclick="filterRecipes('Breakfast')">
                Breakfast
            </button>

            <button onclick="filterRecipes('Lunch')">
                Lunch
            </button>

            <button onclick="filterRecipes('Dinner')">
                Dinner
            </button>

            <button onclick="filterRecipes('Snacks')">
                Snacks
            </button>

            <button onclick="filterRecipes('Dessert')">
                Dessert
            </button>

        </div>

        <div class="search-icon">
            🔍
        </div>

    </div>

    <!-- HERO -->
    <div class="premium-hero">

        <div class="premium-left">

            <p class="chef-title">
                CHEF'S SPECIAL
            </p>

            <h1>
                Freshness <br>
                in every bite
            </h1>

            <div class="premium-buttons">

                <button
                class="view-btn"
                onclick="showSection('home')">

                    View recipe

                </button>

                <button
                class="favorite-btn"
                onclick="showSection('favorites')">

                    Favorite recipes

                </button>

            </div>
            <button
class="add-btn"
onclick="showSection('addRecipe')">

    Add Recipe

</button>

            <button
            class="add-btn"
            onclick="showSection('home')">

                Add recipe

            </button>

        </div>

        <div class="premium-right">

            <img
            src="https://images.unsplash.com/photo-1546069901-ba9599a7e63c?q=80&w=1200&auto=format&fit=crop">

        </div>


    <!-- Dark Mode Button -->

    <!-- Search Bar -->




</div>
    <!-- Form -->
    <div
class="form"
id="recipeForm"
style="display:none;">

        <input
            type="text"
            id="title"
            placeholder="Recipe Name"
        >
        <select id="category">

    <option value="">Select Category</option>

    <option value="Breakfast">Breakfast</option>

    <option value="Lunch">Lunch</option>

    <option value="Dinner">Dinner</option>

    <option value="Snacks">Snacks</option>

    <option value="Dessert">Dessert</option>

</select>

        <!-- Image Upload -->
        <input type="file" id="imageFile">
         placeholder="Paste Image URL">

        <textarea
            id="ingredients"
            placeholder="Ingredients"
        ></textarea>

        <textarea
            id="steps"
            placeholder="Steps"
        ></textarea>

        <button onclick="addRecipe()">
            Add Recipe
        </button>

    </div>

    <!-- Recipe List -->
    <div id="home-section">
      <div class="recipe-search">

    <input
        type="text"
        id="search"
        placeholder="🔍 Search recipe..."
        onkeyup="searchRecipe()"
    >

</div>
    <div id="recipeList"></div>
</div>

<div id="favorites-section" style="display:none;">
    <h2>❤️ Favorite Recipes</h2>
    <div id="favoriteList"></div>
</div>

<div id="profile-section" style="display:none;">
  <div class="profile-form" id="profileForm">

    <input type="file" id="profileImage">

    <input
        type="text"
        id="username"
        placeholder="Enter Username"
    >

    <input
        type="email"
        id="gmail"
        placeholder="Enter Gmail"
    >

    <select id="gender">
        <option value="Male">Male</option>
        <option value="Female">Female</option>
        <option value="Other">Other</option>
    </select>

    <input
        type="text"
        id="country"
        placeholder="Enter Country"
    >

    <button onclick="saveProfile()">
        Save Profile
    </button>

</div>
<button onclick="editProfile()"
id="editProfileBtn"
style="display:none;">
    ✏️ Edit Profile
</button>

<div class="profile-card">

    <img id="profilePreview" src="">

    <h3 id="showUsername"></h3>

    <p id="showEmail"></p>

    <p id="showGender"></p>

    <p id="showCountry"></p>

</div>
    <h2>👤 Your Profile</h2>

    <p id="profileEmail"></p>

    <p>
        Total Recipes:
        <span id="recipeCount">0</span>
    </p>
    <button
class="profile-logout-btn"
onclick="logout()">

    🚪 Logout

</button>
</div>

    <!-- JavaScript -->
    <script type="module" src="script.js"></script>
</div>
</body>

</html>
