<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Recipe Sharing Platform</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="auth-container" id="authPage">

    <div class="auth-box">

        <h1>🍲 Recipe Hub</h1>

        <p class="subtitle">
            Share your favorite recipes 😎
        </p>

        <input
            type="email"
            id="email"
            placeholder="Enter Email"
        >

        <input
            type="password"
            id="password"
            placeholder="Enter Password"
        >

        <button class="signup-btn" onclick="signup()">
            Sign Up
        </button>

        <button class="login-btn" onclick="login()">
            Login
        </button>

        <button class="logout-btn" onclick="logout()">
            Logout
        </button>

    </div>

</div>
    <div id="app" style="display:none;">
      <div class="bottom-nav">

    <button onclick="showSection('home')">
        🏠 Home
    </button>

    <button onclick="showSection('favorites')">
        ❤️ Favorites
    </button>

    <button onclick="showSection('profile')">
        👤 Profile
    </button>

</div>
    <h1>🍲 Recipe Sharing Website</h1>

    <!-- Dark Mode Button -->
    <button onclick="toggleDarkMode()">
        🌙 Dark Mode
    </button>

    <!-- Search Bar -->
    <input
        type="text"
        id="search"
        placeholder="🔍 Search recipe..."
        onkeyup="searchRecipe()"
    >

    <!-- Form -->
    <div class="form">

        <input
            type="text"
            id="title"
            placeholder="Recipe Name"
        >

        <!-- Image Upload -->
        <input type="file" id="imageFile">
         placeholder="Paste Image URL">

        <textarea
            id="ingredients"
            placeholder="Ingredients"
        ></textarea>

        <textarea
            id="steps"
            placeholder="Steps"
        ></textarea>

        <button onclick="addRecipe()">
            Add Recipe
        </button>

    </div>

    <!-- Recipe List -->
    <div id="home-section">
    <div id="recipeList"></div>
</div>

<div id="favorites-section" style="display:none;">
    <h2>❤️ Favorite Recipes</h2>
    <div id="favoriteList"></div>
</div>

<div id="profile-section" style="display:none;">
  <div class="profile-form">

    <input type="file" id="profileImage">

    <input
        type="text"
        id="username"
        placeholder="Enter Username"
    >

    <input
        type="email"
        id="gmail"
        placeholder="Enter Gmail"
    >

    <select id="gender">
        <option value="Male">Male</option>
        <option value="Female">Female</option>
        <option value="Other">Other</option>
    </select>

    <input
        type="text"
        id="country"
        placeholder="Enter Country"
    >

    <button onclick="saveProfile()">
        Save Profile
    </button>

</div>

<div class="profile-card">

    <img id="profilePreview" src="">

    <h3 id="showUsername"></h3>

    <p id="showEmail"></p>

    <p id="showGender"></p>

    <p id="showCountry"></p>

</div>
    <h2>👤 Your Profile</h2>

    <p id="profileEmail"></p>

    <p>
        Total Recipes:
        <span id="recipeCount">0</span>
    </p>
</div>

    <!-- JavaScript -->
    <script type="module" src="script.js"></script>
</div>
</body>

</html>
