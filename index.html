<!DOCTYPE html>
<html>
<head>
    <title>Recipe Sharing</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>🍲 Recipe Sharing Website</h1>
<input type="text" id="search" placeholder="🔍 Search recipe..." onkeyup="searchRecipe()">
    <div class="form">
        <input type="text" id="title" placeholder="Recipe Name">
        <input type="file" id="image">
        <textarea id="ingredients" placeholder="Ingredients"></textarea>
        <textarea id="steps" placeholder="Steps"></textarea>
        <button onclick="addRecipe()">Add Recipe</button>
    </div>

    <h2>All Recipes</h2>
    <div id="recipeList"></div>

    <script src="script.js"></script>
 <link rel="stylesheet" href="style.css">
<script src="script.js"></script>
</body>
</html>
